name: Samarth Physiotherapy & Engineering CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  phase-1-gitleaks:
    name: Phase 1 - Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to scan full git history

      - name: Run Gitleaks Secret Detector
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  phase-1-eslint:
    name: Phase 1 - JS Linting (ESLint)
    needs: phase-1-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run ESLint
        run: |
          npm ci
          npx eslint . --ext .js,.jsx,.ts,.tsx || echo "ESLint not configured yet, skipping..."

  phase-1-bandit:
    name: Phase 1 - Python Security (Bandit)
    needs: phase-1-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit & Run Scan
        run: |
          pip install bandit
          bandit -r . -x ./tests

  phase-1-semgrep:
    name: Phase 1 - SAST (Semgrep)
    needs: phase-1-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep OWASP Scan
        run: |
          pip install semgrep
          semgrep --config=p/owasp-top-ten . --error

  dependency-security:
    name: Phase 2 - Dependency Security
    runs-on: ubuntu-latest
    needs: [phase-1-eslint, phase-1-bandit, phase-1-semgrep]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run NPM Audit
        run: |
          if [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ]; then
            npm audit --audit-level=high
          else
            echo "No package-lock.json found. Skipping NPM audit."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Safety Check
        run: |
          pip install safety
          if [ -f "requirements.txt" ]; then
            safety check -r requirements.txt
          else
            echo "No requirements.txt found. Skipping Safety check."
          fi

  unit-testing:
    name: Phase 3 - Unit Testing & Property Tests
    runs-on: ubuntu-latest
    needs: dependency-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Test Dependencies
        run: |
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov hypothesis

      - name: Run Pytest & Enforce Coverage (80%)
        run: |
          if [ -d "tests" ] || [ -d "test" ]; then
            pytest --cov=. --cov-report=xml --cov-fail-under=80
          else
            echo "No 'tests' directory found. Skipping Pytest."
          fi

  integration-testing:
    name: Phase 4 - API, DB & Integration Testing
    runs-on: ubuntu-latest
    needs: unit-testing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt || echo "Requirements not found"
          pip install schemathesis testcontainers[postgres]
          npm install -g dredd
          npm ci || echo "Skipping frontend dependencies install until package.json is ready"

      - name: Run Dredd OpenAPI Validation
        run: |
          if [ -f "openapi.yaml" ]; then
            dredd openapi.yaml http://localhost:8000 || echo "Dredd expected an active server"
          else
            echo "openapi.yaml not found. Skipping Dredd."
          fi

      - name: Run Schemathesis API Spec Check
        run: |
          if [ -f "openapi.yaml" ]; then
            schemathesis run openapi.yaml --dry-run || echo "Run dry-run until API is active"
          else
            echo "openapi.yaml not found. Skipping Schemathesis."
          fi

      - name: Run Playwright E2E Integration Tests
        run: |
          if [ -f "package.json" ]; then
            npx playwright install --with-deps
            npm run test:e2e || echo "Playwright tests not yet configured"
          else
            echo "package.json not found. Skipping Playwright."
          fi

  dast-and-pentest:
    name: Phase 5 - DAST & Security Pen Testing
    runs-on: ubuntu-latest
    needs: integration-testing
    environment: staging
    env:
      STAGING_URL: "https://staging.samarthphysiotherapy.com"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        run: |
          # ZAP targets the isolated STAGING_URL, strictly avoiding production
          docker run --rm -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t ${{ env.STAGING_URL }} -r zap-report.html || echo "ZAP detected issues, review report"

      - name: Run Nikto Web Server Scan
        run: |
          # Nikto scans for 6,700+ misconfigs on the staging server
          docker run --rm -v $(pwd):/tmp sullo/nikto \
            -h ${{ env.STAGING_URL }} -o /tmp/nikto-report.html || echo "Nikto scan completed"

      - name: Mozilla Observatory HTTP Headers Scan
        run: |
          # Grades HTTP security headers A-F
          curl -s -X POST "https://http-observatory.security.mozilla.org/api/v1/analyze?host=$(echo ${{ env.STAGING_URL }} | sed 's/https:\/\///')"

      - name: SSL Labs Analysis
        run: |
          # Deep SSL/TLS analysis for HIPAA/DPDP compliance
          curl -s "https://api.ssllabs.com/api/v3/analyze?host=$(echo ${{ env.STAGING_URL }} | sed 's/https:\/\///')"

  iac-and-cloud-security:
    name: Phase 6 - IaC & Cloud Security
    runs-on: ubuntu-latest
    needs: dast-and-pentest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile Security Linter)
        if: hashFiles('Dockerfile') != ''
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Enforce tags, block root user (DL3002), require explicit USER (DL3002 implies running as root)
          failure-threshold: error

      - name: Run Checkov IaC Security Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes,dockerfile
          quiet: false
          soft_fail: false # Hard fail to block merge requests on public S3/open SGs

  container-build-and-security:
    name: Phase 7 - Container Build & Security
    runs-on: ubuntu-latest
    needs: iac-and-cloud-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        if: hashFiles('Dockerfile') != ''
        run: |
          docker build -t samarth-physiotherapy:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        if: hashFiles('Dockerfile') != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "samarth-physiotherapy:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  load-testing-and-chaos:
    name: Phase 8 - Load Testing & Chaos Engineering
    runs-on: ubuntu-latest
    needs: container-build-and-security
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        run: |
          if [ -f "tests/load_test.js" ]; then
            k6 run -e STAGING_URL=https://staging.samarthphysiotherapy.com tests/load_test.js
          else
            echo "tests/load_test.js not found. Skipping k6 load test."
          fi

  accessibility-compliance:
    name: Phase 12 - Accessibility (a11y) & Legal Compliance
    runs-on: ubuntu-latest
    needs: load-testing-and-chaos
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci

      - name: Run pa11y-ci WCAG 2.1 AA Scan
        run: |
          if [ -f ".pa11yci" ]; then
            pa11y-ci https://staging.samarthphysiotherapy.com --config .pa11yci
          else
            echo ".pa11yci not found. Skipping pa11y-ci accessibility scan."
          fi
